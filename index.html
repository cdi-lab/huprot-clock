
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuProt™ Fluorescence Clock — CDI Labs</title>
  <meta name="description" content="A live wall clock inspired by the HuProt™ Human Proteome Microarray fluorescence scan.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    .header {
      position: absolute;
      top: 24px;
      text-align: center;
      z-index: 10;
    }

    .header .title {
      font-size: 11px;
      letter-spacing: 5px;
      color: #e8f4ff;
      opacity: 1.0;
      text-transform: uppercase;
    }

    .header .sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: #d0e8ff;
      opacity: 1.0;
      margin-top: 4px;
      text-transform: uppercase;
    }

    #clockCanvas {
      display: block;
      max-width: 95vmin;
      max-height: 95vmin;
    }

    .footer {
      position: absolute;
      bottom: 18px;
      font-size: 8px;
      letter-spacing: 2.5px;
      color: #d0e8ff;
      opacity: 1.0;
      text-transform: uppercase;
      text-align: center;
    }

    .fullscreen-btn {
      position: absolute;
      bottom: 18px;
      right: 22px;
      background: transparent;
      border: 1px solid #1e3355;
      color: #3a6faa;
      padding: 6px 12px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      z-index: 10;
    }

    .fullscreen-btn:hover {
      background: rgba(74, 158, 255, 0.12);
      border-color: #4a9eff;
      color: #8ac4ff;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">CDI Labs · HuProt™ Human Proteome Microarray</div>
    <div class="sub">Fluorescence Scan Clock · 21,000+ Human Proteins</div>
  </div>

  <canvas id="clockCanvas" width="800" height="800"></canvas>

  <div class="footer">16,794 Unique Genes · 81% Coverage · 350+ Publications</div>

  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<script>
  const canvas = document.getElementById('clockCanvas');
  const ctx = canvas.getContext('2d');

  // High-DPI support
  const DPR = window.devicePixelRatio || 1;
  const LOGICAL = 800;
  canvas.width = LOGICAL * DPR;
  canvas.height = LOGICAL * DPR;
  canvas.style.width = LOGICAL + 'px';
  canvas.style.height = LOGICAL + 'px';
  ctx.scale(DPR, DPR);

  const SIZE = LOGICAL;
  const CENTER = SIZE / 2;
  const RADIUS = SIZE * 0.44;

  // ── Deterministic seeded random ────────────────────────────────────────────
  function sr(n) {
    let x = Math.sin(n * 127.1 + 311.7) * 43758.5453;
    return x - Math.floor(x);
  }

  // ── Build spot grid ────────────────────────────────────────────────────────
  const SPACING = 10.5;
  const SPOT_INNER = RADIUS - 18;
  const spots = [];
  let idx = 0;

  for (let gy = -SPOT_INNER; gy <= SPOT_INNER; gy += SPACING) {
    for (let gx = -SPOT_INNER; gx <= SPOT_INNER; gx += SPACING) {
      if (gx * gx + gy * gy < SPOT_INNER * SPOT_INNER) {
        spots.push({
          cx: CENTER + gx,
          cy: CENTER + gy,
          r1: sr(idx),
          r2: sr(idx + 5000),
          idx: idx
        });
        idx++;
      }
    }
  }

  // ── Map spots near each hour position ──────────────────────────────────────
  const hourIndexOf = {};
  spots.forEach(s => {
    for (let h = 0; h < 12; h++) {
      const ang = (h / 12) * Math.PI * 2 - Math.PI / 2;
      const tx = CENTER + Math.cos(ang) * (RADIUS * 0.79);
      const ty = CENTER + Math.sin(ang) * (RADIUS * 0.79);
      const d = Math.sqrt((s.cx - tx) ** 2 + (s.cy - ty) ** 2);
      if (d < 18) hourIndexOf[s.idx] = h;
    }
  });

  // ── Fluorescence color palette ─────────────────────────────────────────────
  const HOUR_PALETTE = [
    'rgba(255,235,60,0.93)',  'rgba(60,255,130,0.90)', 'rgba(255,70,70,0.90)',
    'rgba(255,235,60,0.93)',  'rgba(60,255,130,0.90)', 'rgba(255,70,70,0.90)',
    'rgba(255,235,60,0.93)',  'rgba(100,200,255,0.90)','rgba(60,255,130,0.90)',
    'rgba(255,70,70,0.90)',   'rgba(255,235,60,0.93)', 'rgba(60,255,130,0.90)',
  ];

  function spotColor(v, isHour, hIdx) {
    if (isHour) return HOUR_PALETTE[hIdx % 12];
    if (v > 0.970) return 'rgba(255,240,80,0.95)';
    if (v > 0.930) return 'rgba(60,255,130,0.92)';
    if (v > 0.880) return 'rgba(255,70,70,0.90)';
    if (v > 0.800) return 'rgba(100,200,60,0.62)';
    if (v > 0.680) return 'rgba(180,40,40,0.50)';
    if (v > 0.520) return 'rgba(0,120,50,0.35)';
    if (v > 0.350) return 'rgba(100,20,20,0.26)';
    return 'rgba(0,50,20,0.18)';
  }

  // ── Draw a clock hand ──────────────────────────────────────────────────────
  function drawHand(angle, length, width, color, glowColor) {
    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = glowColor || color;
    ctx.beginPath();
    ctx.moveTo(
      CENTER - Math.cos(angle) * length * 0.14,
      CENTER - Math.sin(angle) * length * 0.14
    );
    ctx.lineTo(
      CENTER + Math.cos(angle) * length,
      CENTER + Math.sin(angle) * length
    );
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
  }

  // ── Main render loop ───────────────────────────────────────────────────────
  function drawFrame() {
    const now = new Date();
    const hr  = now.getHours() % 12;
    const mn  = now.getMinutes();
    const sc  = now.getSeconds();
    const ms  = now.getMilliseconds();

    ctx.clearRect(0, 0, SIZE, SIZE);

    // Background disc
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, RADIUS + 20, 0, Math.PI * 2);
    ctx.fillStyle = '#050810';
    ctx.fill();

    // Outer rim
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, RADIUS + 16, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(74,158,255,0.24)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Inner rim
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, RADIUS + 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(74,158,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // ── Protein spots ────────────────────────────────────────────────────────
    for (const s of spots) {
      const isHour = s.idx in hourIndexOf;
      const hIdx = hourIndexOf[s.idx] ?? 0;
      const color = spotColor(s.r1, isHour, hIdx);
      const r = isHour ? (2.2 + s.r1 * 1.2) : (1.3 + s.r1 * 0.8);

      ctx.save();
      if (isHour || s.r1 > 0.88) {
        ctx.shadowBlur = isHour ? 10 : 5;
        ctx.shadowColor = color;
      }
      ctx.beginPath();
      ctx.arc(s.cx, s.cy, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    // ── Hour tick marks ──────────────────────────────────────────────────────
    for (let h = 0; h < 12; h++) {
      const ang = (h / 12) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(
        CENTER + Math.cos(ang) * (RADIUS + 0),
        CENTER + Math.sin(ang) * (RADIUS + 0)
      );
      ctx.lineTo(
        CENTER + Math.cos(ang) * (RADIUS + 12),
        CENTER + Math.sin(ang) * (RADIUS + 12)
      );
      ctx.strokeStyle = 'rgba(74,158,255,0.45)';
      ctx.lineWidth = h % 3 === 0 ? 3 : 1.5;
      ctx.stroke();
    }

    // ── Minute tick marks ────────────────────────────────────────────────────
    for (let m = 0; m < 60; m++) {
      if (m % 5 === 0) continue;
      const ang = (m / 60) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(CENTER + Math.cos(ang) * (RADIUS + 5), CENTER + Math.sin(ang) * (RADIUS + 5));
      ctx.lineTo(CENTER + Math.cos(ang) * (RADIUS + 12), CENTER + Math.sin(ang) * (RADIUS + 12));
      ctx.strokeStyle = 'rgba(74,158,255,0.15)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // ── Hour numerals ────────────────────────────────────────────────────────
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let h = 1; h <= 12; h++) {
      const ang = (h / 12) * Math.PI * 2 - Math.PI / 2;
      const tr = RADIUS * 0.92;
      ctx.font = h % 3 === 0 ? 'bold 14px Courier New' : '10px Courier New';
      ctx.fillStyle = 'rgba(180,210,255,0.68)';
      ctx.fillText(String(h),
        CENTER + Math.cos(ang) * tr,
        CENTER + Math.sin(ang) * tr
      );
    }

    // ── Clock hands ──────────────────────────────────────────────────────────
    const secAng = ((sc + ms / 1000) / 60) * Math.PI * 2 - Math.PI / 2;
    const minAng = ((mn + sc / 60) / 60) * Math.PI * 2 - Math.PI / 2;
    const hrAng  = ((hr + mn / 60) / 12) * Math.PI * 2 - Math.PI / 2;

    drawHand(hrAng,  RADIUS * 0.50, 6,   'rgba(200,225,255,0.95)', 'rgba(100,180,255,0.5)');
    drawHand(minAng, RADIUS * 0.71, 3.5, 'rgba(150,200,255,0.92)', 'rgba(80,160,255,0.4)');
    drawHand(secAng, RADIUS * 0.81, 1.8, 'rgba(255,80,80,0.95)',   'rgba(255,100,100,0.6)');

    // ── Center cap ───────────────────────────────────────────────────────────
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(255,100,100,0.6)';
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(CENTER, CENTER, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,80,80,0.95)';
    ctx.fill();
    ctx.restore();

    // ── Branding ─────────────────────────────────────────────────────────────
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(224,240,255,0.95)';
    ctx.fillText('HuProt™', CENTER, CENTER - RADIUS * 0.94);

    ctx.font = '8px Courier New';
    ctx.fillStyle = 'rgba(208,232,255,0.92)';
    ctx.fillText('CDI Labs', CENTER, CENTER + RADIUS * 0.94);

    // ── Digital time ─────────────────────────────────────────────────────────
    ctx.font = '9px Courier New';
    ctx.fillStyle = 'rgba(208,232,255,0.92)';
    ctx.fillText(now.toLocaleTimeString('en-US', { hour12: false }), CENTER, CENTER + RADIUS * 0.85);

    requestAnimationFrame(drawFrame);
  }

  // ── Fullscreen toggle ──────────────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // ── Responsive canvas sizing ───────────────────────────────────────────────
  function resize() {
    const vmin = Math.min(window.innerWidth, window.innerHeight);
    const sz = Math.min(vmin * 0.88, 800);
    canvas.style.width = sz + 'px';
    canvas.style.height = sz + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // Start
  drawFrame();
</script>
</body>
</html>
